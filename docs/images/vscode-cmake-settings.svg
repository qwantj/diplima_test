  <text x="80" y="110" font-family="Segoe UI, Arial" font-size="24" fill="#dcdcdc">VS Code — .vscode/settings.json</text>
  <text x="80" y="170" font-family="Consolas, monospace" font-size="16" fill="#9cdcfe">"cmake.configureSettings": {</text>
